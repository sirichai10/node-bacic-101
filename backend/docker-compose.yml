name: node-learn-101
services:
  db:
    image: postgres:15-alpine
    container_name: node-learn-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${REGISTRY:-localhost:5001}/${IMAGE_NAME:-express-app}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-learn-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://postgres:password@db:5432/postgres?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
