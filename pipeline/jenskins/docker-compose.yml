version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8000:8080"   # Jenkins Web UI
      - "50000:50000" # Jenkins agent port (for JNLP agents)
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Bangkok
    networks:
      - jenkins-net

  registry:
    image: registry:2
    container_name: docker-registry
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - jenkins-net

volumes:
  jenkins_home:
    name: jenkins_home
  registry_data:
    name: registry_data

networks:
  jenkins-net:
    name: jenkins-net
    driver: bridge
