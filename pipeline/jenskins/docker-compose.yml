version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8000:8080"   # Jenkins Web UI
      - "50000:50000" # Jenkins agent port (for JNLP agents)
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - TZ=Asia/Bangkok
    networks:
      - jenkins-net

volumes:
  jenkins_home:
    name: jenkins_home

networks:
  jenkins-net:
    name: jenkins-net
    driver: bridge
